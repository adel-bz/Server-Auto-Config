## Install dependencies role tasks ##

---

# 1. Install Certbot - Nginx - Docker and their dependencies #

- name: Install dependencies packages
  apt:
    update_cache: true
    state: latest
    name:
    - apt-transport-https
    - ca-certificates
    - software-properties-common
    - curl
    - gnupg
    - python3-pip
    - libffi-dev
    - python3-dev
    - nginx
    - certbot
    - python3-certbot-nginx
  become: true

##################################################################

# 2. Install Docker #

- name: Ensure apt keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Get dpkg architecture for Docker repository
  command: dpkg --print-architecture
  register: docker_dpkg_arch
  changed_when: false

- name: Download Docker CE archive key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true

- name: Install Docker apt signing key
  command: gpg --batch --dearmor -o /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.gpg
  become: true

- name: Configure Docker apt repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch={{ docker_dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable\n"
    mode: "0644"
  become: true

- name: Install docker-ce
  apt:
    update_cache: true
    name: docker-ce
    state: present
  become: true

- name: Run and enable docker
  service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add user to Docker group
  user:
    name: "{{ user }}"
    groups: docker
    append: true
  become: true

##################################################################

# 3. Install Docker Compose #

- name: Install Docker Compose Plugin
  apt:
    name: docker-compose-plugin
    state: present
  become: true

##################################################################
