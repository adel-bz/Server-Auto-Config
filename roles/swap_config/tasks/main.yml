## Enable Swap for server ""

---

# 1. Config Swap #

- name: Check if swap is already configured
  command: swapon --show
  register: swap_status
  changed_when: false

- name: Decide if this role should add /swapfile (no swap devices active yet)
  set_fact:
    swap_needs_role: "{{ (swap_status.stdout | default('', true) | trim) == '' }}"

- name: Stat /swapfile
  stat:
    path: /swapfile
  register: swap_file_stat

- name: Create swap file (fully allocated, no holes)
  shell: |
    set -euo pipefail
    if [ -f /swapfile ]; then echo SKIPPED; exit 0; fi
    dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none
    echo CREATED
  args:
    executable: /bin/bash
  register: swap_create
  changed_when: "'CREATED' in swap_create.stdout"
  when:
    - swap_needs_role | bool
    - not swap_file_stat.stat.exists
  become: true

- name: Set correct permissions for swap file
  file:
    path: /swapfile
    owner: root
    group: root
    mode: '0600'
  when: swap_needs_role | bool
  become: true

- name: Ensure Linux swap signature on /swapfile (skip if already a swap area)
  shell: |
    set -euo pipefail
    if file -s /swapfile | grep -qi 'Linux swap'; then echo SKIPPED; exit 0; fi
    mkswap /swapfile
  args:
    executable: /bin/bash
  register: mkswap_result
  changed_when: "'Setting up swapspace' in mkswap_result.stdout"
  when: swap_needs_role | bool
  become: true

- name: Activate /swapfile if not already active
  shell: |
    set -euo pipefail
    if swapon --show=NAME --noheadings | grep -qx '/swapfile'; then
      echo ALREADY_ACTIVE; exit 0
    fi
    swapon /swapfile
    echo ACTIVATED
  args:
    executable: /bin/bash
  register: swapon_result
  changed_when: "'ACTIVATED' in swapon_result.stdout"
  when: swap_needs_role | bool
  become: true

- name: Make swap file permanent in fstab
  lineinfile:
    dest: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  when: swap_needs_role | bool
  become: true

- name: Set swappiness and cache pressure
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: 'vm.swappiness', value: '10' }
    - { name: 'vm.vfs_cache_pressure', value: '50' }
  become: true

#######################################################
