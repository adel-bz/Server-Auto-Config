## Gitlab Runner role tasks ##

---

# 1.Install Gitlab Runner on server #

- name: Ensure apt keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download GitLab Runner archive key
  get_url:
    url: https://packages.gitlab.com/gpg.key
    dest: /etc/apt/keyrings/gitlab-runner.asc
    mode: "0644"
  become: true

- name: Install GitLab Runner apt signing key
  command: gpg --batch --dearmor -o /etc/apt/keyrings/gitlab-runner.gpg /etc/apt/keyrings/gitlab-runner.asc
  args:
    creates: /etc/apt/keyrings/gitlab-runner.gpg
  become: true

- name: Add GitLab Runner repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/gitlab-runner.gpg] https://packages.gitlab.com/runner/gitlab-runner/ubuntu/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    filename: gitlab-runner
  become: true

- name: Update Ubuntu packages
  become: true
  apt:
    update_cache: true

- name: Install GitLab Runner
  block:
    - name: Install GitLab Runner package from APT repository
      apt:
        name: gitlab-runner
        state: latest
      become: true
      register: gitlab_runner_apt_install
      retries: 3
      delay: 10
      until: gitlab_runner_apt_install is succeeded
  rescue:
    - name: Ensure curl is installed for fallback setup
      apt:
        name: curl
        state: present
      become: true

    - name: Ensure gitlab-runner system user exists for fallback
      user:
        name: gitlab-runner
        system: true
        create_home: true
        shell: /bin/bash
      become: true

    - name: Set GitLab Runner binary architecture suffix
      set_fact:
        gitlab_runner_bin_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}"

    - name: Download GitLab Runner binary fallback
      get_url:
        url: "https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-linux-{{ gitlab_runner_bin_arch }}"
        dest: /usr/local/bin/gitlab-runner
        mode: "0755"
      become: true

    - name: Install GitLab Runner systemd service fallback
      command: gitlab-runner install --user=gitlab-runner --working-directory=/home/gitlab-runner
      args:
        creates: /etc/systemd/system/gitlab-runner.service
      become: true

    - name: Enable and start GitLab Runner service fallback
      systemd:
        name: gitlab-runner
        enabled: true
        state: started
        daemon_reload: true
      become: true

##################################################################

# 2.Gitlab Runner registery #

- name: Check for existing GitLab Runner configuration
  stat:
    path: /etc/gitlab-runner/config.toml
  register: gitlab_runner_config

- name: Register GitLab Runner
  command: gitlab-runner register \
    --non-interactive \
    --registration-token "{{ gitlab_runner_registration_token }}" \
    --url "{{ gitlab_runner_url }}" \
    --executor "{{ gitlab_runner_executor }}"
  register: gitlab_runner_register_output
  when: not gitlab_runner_config.stat.exists
  become: true

- name: Display GitLab Runner registration output
  debug:
    var: gitlab_runner_register_output.stdout_lines
  when:
    - gitlab_runner_register_output is defined
    - gitlab_runner_register_output is not skipped

##################################################################

# 3.Gitlab Runner Permissions

- name: Update visudo file
  become: true
  lineinfile:
    dest: /etc/sudoers
    insertafter: "@includedir /etc/sudoers.d"
    line: "gitlab-runner ALL=(ALL) NOPASSWD: ALL"
    state: present
    validate: "visudo -cf %s"

##################################################################
